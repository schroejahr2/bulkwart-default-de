name: build-bulkwart-default-de
on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild auch wenn Tag schon existiert (z.B. nach Patch-Aenderung)'
        type: boolean
        default: false
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Neuesten Upstream-Tag holen
        id: up
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh api repos/bulwarkmail/webmail/tags --paginate --jq '.[].name' | sort -V | tail -1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $tag"
      - name: Schon gebaut?
        id: chk
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; echo "force=true -> rebuild erzwungen."
          elif docker manifest inspect ghcr.io/${{ github.repository_owner }}/bulkwart-default-de:${{ steps.up.outputs.tag }} >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; echo "Tag bereits gebaut, skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upstream @ Tag auschecken
        if: steps.chk.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: bulwarkmail/webmail
          ref: ${{ steps.up.outputs.tag }}
      - name: Server-URL-Anzeige durch Mail-Domain ersetzen (Org-Trennung)
        if: steps.chk.outputs.skip == 'false'
        run: |
          f=components/settings/account-settings.tsx
          test -f "$f"
          # Guards: bricht ab wenn Upstream die Stellen umbaut (dann Patch anpassen)
          grep -qF "{serverUrl || t('../../common.unknown')}" "$f"
          grep -qF "{hostnameOf(account.serverUrl)}" "$f"
          sed -i "s#{serverUrl || t('../../common.unknown')}#{(email || '').split('@')[1] || t('../../common.unknown')}#" "$f"
          sed -i "s#{hostnameOf(account.serverUrl)}#{(account.email || account.username || '').split('@')[1] || ''}#" "$f"
          echo '--- patched ---'
          grep -n "split('@')" "$f"
      - name: TOTP-Toggle auf Login-Seite entfernen (Keycloak macht 2FA)
        if: steps.chk.outputs.skip == 'false'
        run: |
          f='app/(main)/[locale]/login/page.tsx'
          test -f "$f"
          # Guards: bricht ab wenn Upstream die Stelle umbaut (dann Patch anpassen)
          grep -qF '{!showTotpField ? (' "$f"
          grep -qF 'totp_toggle' "$f"
          sed -i '/{!showTotpField ? (/,/) : (/c\
                  {showTotpField \&\& (' "$f"
          grep -qF '{showTotpField && (' "$f"
          echo '--- patched: manueller 2FA-Toggle entfernt, Auto-Show (totp_required) bleibt ---'
      - name: Favicon-Route auf Domain-direkt patchen (DDG nur Fallback)
        if: steps.chk.outputs.skip == 'false'
        run: |
          echo '' | base64 -d | python3 -
      - name: Build & Push (de-Default)
        if: steps.chk.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: NEXT_PUBLIC_DEFAULT_LOCALE=de
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bulkwart-default-de:${{ steps.up.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/bulkwart-default-de:latest
